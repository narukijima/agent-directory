name: route-to-skill

request: |
  <skill-name>を使って対象を分析して。

expect:
  route: skill
  must_read:
    - AGENTS.md
    - skills/README.md
    - skills/<skill-name>/SKILL.md
  may_write:
    - .tmp/**
  must_not_write:
    - knowledge/raw/**
    - knowledge/research/**
    - projects/**
    - skills/_template/**
