name: route-to-knowledge

request: |
  この資料の内容を覚えておいて。

expect:
  route: knowledge
  must_read:
    - AGENTS.md
    - knowledge/KNOWLEDGE.md
  may_write:
    - knowledge/**
    - .tmp/**
  must_not_write:
    - skills/**
    - projects/**
  must_not_modify:
    - knowledge/raw/**
    - knowledge/research/**
